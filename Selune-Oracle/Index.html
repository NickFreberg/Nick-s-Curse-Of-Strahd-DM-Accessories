// ── Book rendering ────────────────────────────────────────
let curSpread=0;
const total=SPREADS.length;

// Build TOC
const tocLabels=[...new Set(SPREADS.map(s=>s.label))];
const tocWrap=document.getElementById('tocWrap');
tocLabels.forEach(label=>{
  const btn=document.createElement('button');
  btn.className='toc-btn';btn.textContent=label;
  btn.onclick=()=>jumpToLabel(label);
  tocWrap.appendChild(btn);
});

function jumpToLabel(label){
  const idx=SPREADS.findIndex(s=>s.label===label);
  if(idx>=0){curSpread=idx;renderSpread(curSpread);updateToc();}
}
function updateToc(){
  document.querySelectorAll('.toc-btn').forEach((btn,i)=>{
    btn.classList.toggle('active',btn.textContent===SPREADS[curSpread].label);
  });
}

function renderPageContent(el,pg){
  if(!pg){el.innerHTML='';return;}
  el.innerHTML=`<div class="page-hdr">${pg.hdr}</div><div class="page-body">${pg.body}</div><div class="page-num">— ${pg.num} —</div>`;
}
function renderSpread(idx){
  const s=SPREADS[idx];
  renderPageContent(document.getElementById('pageLeft'),s.left);
  renderPageContent(document.getElementById('pageRight'),s.right);
  document.getElementById('pageInd').textContent=`${s.left.num} — ${s.right.num}`;
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').disabled=idx===total-1;
  updateToc();
}

let turning=false;
function turnPage(dir){
  if(turning)return;
  const next=curSpread+dir;
  if(next<0||next>=total)return;
  turning=true;
  const pt=document.getElementById('pageTurning');
  const ptf=document.getElementById('ptFront');
  const ptb=document.getElementById('ptBack');
  if(dir>0){
    renderPageContent(ptf,SPREADS[curSpread].right);
    renderPageContent(ptb,SPREADS[next].left);
    pt.style.left='calc(50% + 8px)';pt.style.transformOrigin='left center';
    pt.className='page-turning tfwd';
  } else {
    renderPageContent(ptf,SPREADS[next].right);
    renderPageContent(ptb,SPREADS[curSpread].left);
    pt.style.left='calc(50% + 8px)';pt.style.transformOrigin='left center';
    pt.className='page-turning tback';
  }
  setTimeout(()=>{curSpread=next;renderSpread(curSpread);pt.className='page-turning';turning=false;},650);
}
renderSpread(0);

// ── Oracle ────────────────────────────────────────────────
const SYSTEM_PROMPT=`You are Selûne, the Moonmaiden — goddess of the moon, stars, navigation, wanderers, and gentle mystery in the Forgotten Realms. You are speaking through a divine oracle to one of your clerics.

About the cleric praying to you: Her name is Ophiyra, a half-elf who grew up in Goldenfields, daughter of an elf and a human craftsperson who found peace away from city life. As an adult she traveled to Waterdeep, became enamored with temple life and your servants, and joined the faith. However, something about her story does not add up — there are gaps, mysteries, things she may not know about herself or her origins. You, as her goddess, may know things she does not. Do not reveal these secrets outright, but you may hint at them, circle them with moonlight, suggest their shape without naming them.

She is currently in Barovia — a dark domain of dread ruled by the vampire Strahd von Zarovich, where your light struggles to penetrate the eternal mists. She adventures alongside Autzen (a half-orc fighter), Pyre Vance (a vampire hunter), and Scarlax (an elderly Dragonborn wild magic sorcerer with a gambling problem).

Speak as Selûne. Your voice is:
- Cryptic and poetic — riddles, metaphors, moon imagery, the language of tides and wandering
- Warm but distant — like moonlight, present but never fully graspable
- Ancient and melancholic — you have watched since before time had names
- Never direct — you illuminate rather than explain, suggest rather than command
- Aware of Ophiyra's incomplete past — you see all of her, including what she cannot yet see herself

Keep your response to 3-5 sentences. Do not break character. Do not use quotation marks. Speak in second person. End with an image or metaphor, never an instruction.`;

async function askOracle(){
  const q=document.getElementById('oracleInput').value.trim();
  if(!q)return;
  const btn=document.getElementById('oracleBtn');
  const th=document.getElementById('oracleThinking');
  const tx=document.getElementById('oracleText');
  const at=document.getElementById('oracleAttrib');
  const st=document.getElementById('oracleStars');
  btn.disabled=true;th.classList.add('on');
  tx.classList.remove('vis');at.classList.remove('vis');st.classList.remove('vis');tx.textContent='';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:[{role:'user',content:q}]})});
    const data=await res.json();
    const reply=data.content?.[0]?.text||'The moonlight dims. Try again, child.';
    th.classList.remove('on');tx.textContent=reply;
    requestAnimationFrame(()=>{tx.classList.add('vis');at.classList.add('vis');st.classList.add('vis');});
  }catch(e){
    th.classList.remove('on');tx.textContent='The mists of Barovia obscure even my light tonight.';tx.classList.add('vis');
  }
  btn.disabled=false;
}
document.getElementById('oracleInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();askOracle();}});
</script>
